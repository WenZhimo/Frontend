<!doctype html>

        <title>明日方舟：终末地 | 官网 - 粒子链路已建立</title>
        <style>

                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #0a0a0f;
                overflow: hidden;
                font-family: "Segoe UI", "PingFang SC", sans-serif;
                color: #ccc;
                user-select: none;
                touch-action: manipulation;
            }
            #canvas-container {
                position: fixed;
                inset: 0;
                z-index: 0;
            }
            .ambient-bg {
                position: fixed;
                inset: -20%;
                z-index: 1;
                pointer-events: none;
                opacity: 0.34;
                background:
                    radial-gradient(
                        circle at 20% 30%,
                        rgba(255, 235, 170, 0.14),
                        transparent 48%
                    ),
                    radial-gradient(
                        circle at 80% 70%,
                        rgba(120, 170, 255, 0.11),
                        transparent 48%
                    ),
                    repeating-linear-gradient(
                        0deg,
                        rgba(255, 255, 255, 0.036) 0px,
                        rgba(255, 255, 255, 0.036) 1px,
                        transparent 1px,
                        transparent 26px
                    ),
                    repeating-linear-gradient(
                        90deg,
                        rgba(255, 255, 255, 0.03) 0px,
                        rgba(255, 255, 255, 0.03) 1px,
                        transparent 1px,
                        transparent 30px
                    );
                transform-origin: center;
            }
            canvas {
                display: block;
            }

            .ui-layer {
                position: fixed;
                inset: 0;
                z-index: 10;
                pointer-events: none;
            }
            .axis-split {
                position: absolute;
                left: 7rem;
                top: 7rem;
                pointer-events: none;
                opacity: 0.78;
                width: 0;
                height: 0;
            }
            .axis-split .h {
                position: absolute;
                left: -6rem;
                top: 0;
                width: min(66vw, 980px);
                height: 1px;
                background: linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.08) 2rem,
                    rgba(255, 255, 255, 0.34) 6rem,
                    rgba(255, 255, 255, 0.16) 16rem,
                    rgba(255, 255, 255, 0.05) 28rem,
                    rgba(255, 255, 255, 0) 100%
                );
            }
            .axis-split .v {
                position: absolute;
                left: 0;
                top: -6rem;
                width: 1px;
                height: min(70vh, 820px);
                background: linear-gradient(
                    180deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.08) 2rem,
                    rgba(255, 255, 255, 0.34) 6rem,
                    rgba(255, 255, 255, 0.16) 16rem,
                    rgba(255, 255, 255, 0.05) 28rem,
                    rgba(255, 255, 255, 0) 100%
                );
            }
            .axis-split.rb {
                left: auto;
                top: auto;
                right: 7rem;
                bottom: 7rem;
            }
            .axis-split.rb .h {
                left: auto;
                right: -6rem;
                background: linear-gradient(
                    270deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.08) 2rem,
                    rgba(255, 255, 255, 0.34) 6rem,
                    rgba(255, 255, 255, 0.16) 16rem,
                    rgba(255, 255, 255, 0.05) 28rem,
                    rgba(255, 255, 255, 0) 100%
                );
            }
            .axis-split.rb .v {
                top: auto;
                bottom: -6rem;
                background: linear-gradient(
                    0deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.08) 2rem,
                    rgba(255, 255, 255, 0.34) 6rem,
                    rgba(255, 255, 255, 0.16) 16rem,
                    rgba(255, 255, 255, 0.05) 28rem,
                    rgba(255, 255, 255, 0) 100%
                );
            }

            .nav {
                position: absolute;
                left: 9.6rem;
                top: 2.7rem;
                display: flex;
                flex-direction: row;
                gap: 0.55rem;
                pointer-events: auto;
                align-items: center;
            }
            .nav-item {
                width: 2.35rem;
                height: 1.85rem;
                border: 1px solid rgba(255, 255, 255, 0.15);
                background: rgba(255, 255, 255, 0.03);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.3s ease;
                position: relative;
                clip-path: polygon(15% 0%, 100% 0%, 85% 100%, 0% 100%);
            }
            .nav-item:hover {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.4);
            }
            .nav-item.active {
                background: rgba(255, 255, 200, 0.12);
                border-color: rgba(255, 255, 150, 0.6);
                box-shadow: 0 0 12px rgba(255, 255, 150, 0.15);
            }
            .nav-item .label {
                font-size: 0.5rem;
                letter-spacing: 0.09em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.5);
                transition: color 0.3s;
            }
            .nav-item.active .label {
                color: rgba(255, 255, 200, 0.9);
            }

            .model-title {
                position: absolute;
                left: 3rem;
                bottom: 3rem;
                pointer-events: none;
            }
            .model-title .tag {
                font-size: 0.55rem;
                letter-spacing: 0.5em;
                text-transform: uppercase;
                color: rgba(255, 255, 200, 0.25);
                margin-bottom: 0.6rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }
            .model-title .tag::after {
                content: "";
                width: 40px;
                height: 1px;
                background: rgba(255, 255, 200, 0.15);
            }
            .model-title .name {
                font-size: 2.4rem;
                font-weight: 100;
                letter-spacing: 0.05em;
                color: rgba(255, 255, 255, 0.8);
                text-transform: uppercase;
            }

            .hud-panel {
                position: absolute;
                right: 3rem;
                top: 3rem;
                min-width: 220px;
                padding: 1.2rem;
                pointer-events: auto;
                background: linear-gradient(
                    135deg,
                    rgba(255, 255, 255, 0.03) 0%,
                    rgba(255, 255, 255, 0.01) 100%
                );
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
            }
            .hud-section {
                margin-bottom: 1.5rem;
            }
            .hud-section:last-child {
                margin-bottom: 0;
            }
            .hud-k {
                font-size: 0.55rem;
                letter-spacing: 0.4em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.3);
                margin-bottom: 0.5rem;
            }
            .hud-big {
                font-size: 1.8rem;
                font-weight: 200;
                letter-spacing: 0.1em;
                color: rgba(255, 255, 255, 0.9);
                line-height: 1;
            }
            .hud-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 0.8rem;
                font-size: 0.6rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.4);
            }
            .hud-row .v {
                color: rgba(255, 255, 225, 0.7);
                font-weight: 300;
            }
            .hud-control-group {
                margin-top: 1.2rem;
            }
            .hud-secure-link {
                font-size: 0.5rem;
                color: rgba(120, 255, 120, 0.4);
                letter-spacing: 0.1em;
                margin-bottom: 1rem;
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .hud-secure-link::before {
                content: "●";
                font-size: 0.4rem;
                color: #4f4;
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0% {
                    opacity: 0.3;
                }
                50% {
                    opacity: 1;
                }
                100% {
                    opacity: 0.3;
                }
            }
            .hud-control-row {
                margin-bottom: 1rem;
            }
            .hud-control-row:last-child {
                margin-bottom: 0;
            }
            .hud-label-row {
                display: flex;
                justify-content: space-between;
                font-size: 0.55rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.3);
                margin-bottom: 0.4rem;
            }
            .hud-slider-container {
                position: relative;
                height: 2px;
                background: rgba(255, 255, 255, 0.08);
                border-radius: 1px;
            }
            .hud-slider-container input[type="range"] {
                -webkit-appearance: none;
                position: absolute;
                top: -6px;
                left: 0;
                width: 100%;
                height: 14px;
                background: transparent;
                outline: none;
                cursor: pointer;
                z-index: 2;
            }
            .hud-slider-container input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 4px;
                height: 12px;
                background: rgba(255, 255, 200, 0.8);
                border-radius: 0;
                transition: background 0.3s;
            }
            .hud-slider-container
                input[type="range"]::-webkit-slider-thumb:hover {
                background: #fff;
            }
            .hud-slider-fill {
                position: absolute;
                top: 0;
                left: 0;
                height: 100%;
                background: rgba(255, 255, 200, 0.3);
                z-index: 1;
            }

            .param-toggle {
                position: absolute;
                right: 2.6rem;
                top: 0.9rem;
                height: 1.9rem;
                padding: 0 0.8rem;
                border: 1px solid rgba(255, 255, 255, 0.16);
                background: rgba(255, 255, 255, 0.04);
                color: rgba(255, 255, 230, 0.82);
                font-size: 0.58rem;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                pointer-events: auto;
                cursor: pointer;
            }
            .param-toggle:hover {
                background: rgba(255, 255, 255, 0.09);
            }
            .param-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.28);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
                z-index: 18;
            }
            .param-drawer {
                position: fixed;
                right: 0;
                top: 0;
                width: min(360px, 88vw);
                height: 100vh;
                padding: 1.1rem 0.9rem;
                background: rgba(8, 10, 18, 0.88);
                border-left: 1px solid rgba(255, 255, 255, 0.12);
                transform: translateX(100%);
                transition: transform 0.28s ease;
                z-index: 19;
                pointer-events: auto;
            }
            .param-drawer.open {
                transform: translateX(0);
            }
            .param-backdrop.open {
                opacity: 1;
                pointer-events: auto;
            }
            .param-head {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 1rem;
            }
            .param-title {
                font-size: 0.62rem;
                letter-spacing: 0.22em;
                color: rgba(255, 255, 255, 0.62);
                text-transform: uppercase;
            }
            .param-close {
                width: 1.8rem;
                height: 1.8rem;
                border: 1px solid rgba(255, 255, 255, 0.15);
                background: transparent;
                color: rgba(255, 255, 255, 0.75);
                cursor: pointer;
            }
            .param-row {
                margin-bottom: 0.9rem;
            }
            .param-row label {
                display: block;
                font-size: 0.62rem;
                color: rgba(255, 255, 255, 0.58);
                letter-spacing: 0.1em;
                margin-bottom: 0.35rem;
                text-transform: uppercase;
            }
            .param-row .line {
                display: flex;
                align-items: center;
                gap: 0.65rem;
            }
            .param-row .line input[type="range"] {
                -webkit-appearance: none;
                width: 100%;
                height: 2px;
                background: rgba(255, 255, 255, 0.18);
            }
            .param-row .line input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: rgba(255, 255, 220, 0.9);
                cursor: pointer;
            }
            .param-row .line input[type="range"]::-moz-range-thumb {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                border: none;
                background: rgba(255, 255, 220, 0.9);
                cursor: pointer;
            }
            .param-row .line .val {
                min-width: 2.3rem;
                text-align: right;
                font-size: 0.62rem;
                color: rgba(255, 255, 225, 0.88);
            }

            /* desktop: keep original HUD, drawer hidden */
            .param-toggle,
            .param-backdrop,
            .param-drawer {
                display: none;
            }

            .arrows {
                position: absolute;
                left: 3rem;
                bottom: 7.5rem;
                display: flex;
                gap: 1rem;
                pointer-events: auto;
            }
            .arrow-btn {
                width: 2.2rem;
                height: 2.2rem;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: transparent;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                color: rgba(255, 255, 255, 0.3);
                font-size: 0.8rem;
            }
            .arrow-btn:hover {
                border-color: rgba(255, 255, 255, 0.3);
                color: rgba(255, 255, 255, 0.8);
                transform: translateY(-2px);
            }

            .loading-overlay {
                position: fixed;
                inset: 0;
                z-index: 40;
                background: rgba(6, 8, 14, 0.9);
                display: flex;
                align-items: center;
                justify-content: center;
                transition: opacity 0.35s ease;
            }
            .loading-overlay.hidden {
                opacity: 0;
                pointer-events: none;
            }
            .loading-card {
                width: min(520px, 86vw);
                padding: 1rem 1.1rem;
                border: 1px solid rgba(255, 255, 255, 0.14);
                background: rgba(255, 255, 255, 0.03);
            }
            .loading-title {
                font-size: 0.66rem;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: rgba(255, 255, 255, 0.64);
                margin-bottom: 0.55rem;
            }
            .loading-meta {
                display: flex;
                justify-content: space-between;
                align-items: baseline;
                margin-bottom: 0.4rem;
                gap: 1rem;
            }
            .loading-item {
                font-size: 0.72rem;
                color: rgba(255, 255, 255, 0.78);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .loading-percent {
                font-size: 0.8rem;
                color: rgba(255, 255, 220, 0.9);
            }
            .loading-bar {
                height: 3px;
                background: rgba(255, 255, 255, 0.12);
                overflow: hidden;
            }
            .loading-fill {
                height: 100%;
                width: 0%;
                background: linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0.35),
                    rgba(255, 255, 220, 0.9)
                );
                transition: width 0.22s ease;
            }

            /* Mobile layout optimization */
            @media (max-width: 900px) {
                .axis-split,
                .axis-split.rb {
                    display: none;
                }

                .nav {
                    left: 0.8rem;
                    right: 0.8rem;
                    top: 0.85rem;
                    gap: 0.45rem;
                    overflow-x: auto;
                    overflow-y: hidden;
                    scrollbar-width: none;
                    -webkit-overflow-scrolling: touch;
                    padding-bottom: 0.2rem;
                }
                .nav::-webkit-scrollbar {
                    display: none;
                }
                .nav-item {
                    width: 2.7rem;
                    height: 2rem;
                    flex: 0 0 auto;
                }
                .nav-item .label {
                    font-size: 0.52rem;
                }

                .hud-panel {
                    left: 0.8rem;
                    right: 0.8rem;
                    top: auto;
                    bottom: 0.8rem;
                    min-width: 0;
                    padding: 0.7rem 0.75rem;
                    background: rgba(8, 10, 18, 0.42);
                    border: 1px solid rgba(255, 255, 255, 0.12);
                    backdrop-filter: blur(3px);
                }
                .param-toggle {
                    display: block;
                    right: 0.8rem;
                    top: auto;
                    bottom: 0.8rem;
                    height: 2rem;
                    font-size: 0.56rem;
                    padding: 0 0.7rem;
                    z-index: 20;
                }
                .param-backdrop,
                .param-drawer {
                    display: block;
                }
                .param-drawer {
                    right: 0;
                    left: 0;
                    top: auto;
                    bottom: 0;
                    width: 100vw;
                    height: 44vh;
                    border-left: none;
                    border-top: 1px solid rgba(255, 255, 255, 0.12);
                    transform: translateY(100%);
                }
                .param-drawer.open {
                    transform: translateY(0);
                }

                /* mobile: hide HUD, simplify layout */
                .hud-panel {
                    display: none;
                }
                .model-title {
                    left: 1.5rem;
                    bottom: 2rem;
                }
                .model-title .name {
                    font-size: 1.8rem;
                }
                .arrows {
                    left: auto;
                    right: 1.5rem;
                    bottom: 2.2rem;
                }
            }
        </style>
    </head>
    <body>
        <div id="canvas-container"></div>
        <div class="ambient-bg" id="ambient-bg"></div>
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-card">
                <div class="loading-title">Loading Assets</div>
                <div class="loading-meta">
                    <div class="loading-item" id="loading-item">
                        Preparing...
                    </div>
                    <div class="loading-percent" id="loading-percent">0%</div>
                </div>
                <div class="loading-bar">
                    <div class="loading-fill" id="loading-fill"></div>
                </div>
            </div>
        </div>

        <div class="ui-layer">
            <div class="axis-split" aria-hidden="true">
                <div class="h"></div>
                <div class="v"></div>
            </div>
            <div class="axis-split rb" aria-hidden="true">
                <div class="h"></div>
                <div class="v"></div>
            </div>
            <nav class="nav" id="nav"></nav>

            <div class="arrows">
                <button class="arrow-btn" id="prev-btn">◁</button>
                <button class="arrow-btn" id="next-btn">▷</button>
            </div>

            <div class="model-title">
                <div class="tag">NEURAL · LINK</div>
                <div class="name" id="model-name"></div>
            </div>
            <div class="hud-panel" id="hud-panel">
                <div class="hud-section hud-control-group">
                    <div class="hud-secure-link">
                        ENDFIELD.ARKNIGHTS.PV // SECURE_LINK
                    </div>
                    <div class="hud-control-row">
                        <div class="hud-label-row">
                            <span>Scale</span>
                            <span id="pc-size-value">4.5</span>
                        </div>
                        <div class="hud-slider-container">
                            <div
                                class="hud-slider-fill"
                                id="pc-size-fill"
                            ></div>
                            <input
                                type="range"
                                id="pc-size-slider"
                                min="0.5"
                                max="10"
                                step="0.1"
                                value="4.5"
                            />
                        </div>
                    </div>

                    <div class="hud-control-row">
                        <div class="hud-label-row">
                            <span>Velocity</span>
                            <span id="pc-rot-value">0.0050</span>
                        </div>
                        <div class="hud-slider-container">
                            <div class="hud-slider-fill" id="pc-rot-fill"></div>
                            <input
                                type="range"
                                id="pc-rot-slider"
                                min="0"
                                max="0.01"
                                step="0.0001"
                                value="0.005"
                            />
                        </div>
                    </div>

                    <div class="hud-control-row">
                        <div class="hud-label-row">
                            <span>Ambient</span>
                            <span id="pc-grid-value">2.00</span>
                        </div>
                        <div class="hud-slider-container">
                            <div
                                class="hud-slider-fill"
                                id="pc-grid-fill"
                            ></div>
                            <input
                                type="range"
                                id="pc-grid-slider"
                                min="0"
                                max="4"
                                step="0.05"
                                value="2"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "./three.module.js",
                    "three/examples/jsm/loaders/GLTFLoader.js": "./loaders/GLTFLoader.js",
                    "three/examples/jsm/utils/BufferGeometryUtils.js": "./utils/BufferGeometryUtils.js"
                }
            }
        </script>
        <script type="module">
            import * as THREE from "three";
            import { GLTFLoader } from "three/examples/jsm/loaders/GLTFLoader.js";
            import * as BufferGeometryUtils from "three/examples/jsm/utils/BufferGeometryUtils.js";

            // ══════════════════════════════════════════
            //  CONFIG — tweak these!
            // ══════════════════════════════════════════
            const POINT_COUNT = 57682; // 每个模型的粒子总数
            // 与 endfield-dots 一致：发散 / 聚拢分段时间与进度映射
            const SCATTER_OUT_MS = 1000; // 粒子散开阶段时长（毫秒）
            const SCATTER_IN_MS = 1800; // 粒子聚拢阶段时长（毫秒）
            const INIT_FLY_IN_MS = 1800; // 初始飞入动画时长（毫秒）
            const SCATTER_RADIUS = [600, 800]; // 粒子散开距离 [最小, 最大]
            const POINT_SIZE_RANGE = [1.0, 1.0]; // 单个粒子随机尺寸范围 [最小, 最大]
            const POINT_SIZE_SCALE = 4.5; // 全局粒子尺寸缩放倍数
            const CAMERA_DISTANCE = 200; // 相机到原点的距离
            const ORG_REST_SCALE = 0.5; // 原站后续5个模型缩放（不影响 logo / DIJIANG）
            /** 各模型沿世界 +Y 为上的坐标系整体平移（正值=模型下移，即顶点 Y 减小） */
            const BIN_MODEL_SHIFT_DOWN_Y = {
                logo: -36,
                dijiang: 0,
                anchor: -20,
                factory: 32,
                pile: 32,
                trinity: 0,
                enemy: 0,
                hk3: 0,

            const LOGO_INK_LUM_MAX = 10; // 亮度低于此值的像素视为「黑色笔画」（含抗锯齿边缘）；纯黑白图可调低148

            const HK3_SHARP_EDGE_DEG = 43; // HK3 锐边阈值（相邻三角面法线夹角，度）
            const FIRST_MODEL_NO_AUTO_ROT = true; // 第一个模型（索引 0）不自动公转
            const AUTO_ROTATION_SPEED = 0.005; // 自动公转每帧角增量（弧度），中间值默认 0.0050
            const FIRST_MODEL_VIEW_THETA = 0; // 第一个模型固定朝向：水平角（弧度）
            const FIRST_MODEL_VIEW_PHI = Math.PI / 2; // 俯仰角：π/2 为从 +Z 正视 XY 平面上的 Logo
            /** 切回第一个模型时，水平角插值允许的最大整圈数（总扫角 ≤ 该值×2π）；0 表示仅用最短角路径 */
            const MAX_BLEND_FULL_ROTATIONS_TO_FIRST = 5;
            const CAMERA_DRIFT_X = 7.0; // 画面微动：相机 X 轴偏移幅度
            const CAMERA_DRIFT_Y = 4.5; // 画面微动：相机 Y 轴偏移幅度
            const CAMERA_DRIFT_Z = 3.5; // 画面微动：相机 Z 轴偏移幅度
            const CAMERA_DRIFT_SPEED = 0.00045; // 画面微动速度
            const LOOK_AT_OFFSET_Y = 18; // 轻微抬升观察点，让主体略靠下（被上横线“框住”）
            let ambientGridGain = 2.0; // 背景网格明显程度（0~4）

            // ──────────────────────────────────────────
            // 1. Point Cloud Model Generators (wireframe / surface only)
            // ──────────────────────────────────────────

            // arc-length CDF builder: returns a sampler function for uniform-on-curve sampling
            function buildArcLengthSampler(curveFn, tMin, tMax, segments) {
                const N = segments || 1024;
                const cdf = new Float64Array(N);
                const step = (tMax - tMin) / N;
                let prev = curveFn(tMin);
                for (let j = 0; j < N; j++) {
                    const t = tMin + (j + 1) * step;
                    const cur = curveFn(t);
                    const dx = cur[0] - prev[0],
                        dy = cur[1] - prev[1],
                        dz = cur[2] - prev[2];
                    cdf[j] =
                        (j === 0 ? 0 : cdf[j - 1]) +
                        Math.sqrt(dx * dx + dy * dy + dz * dz);
                    prev = cur;
                }
                const total = cdf[N - 1];
                for (let j = 0; j < N; j++) cdf[j] /= total;
                return function () {
                    const u = Math.random();
                    let lo = 0,
                        hi = N - 1;
                    while (lo < hi) {
                        const m = (lo + hi) >> 1;
                        if (cdf[m] < u) lo = m + 1;
                        else hi = m;
                    }
                    const frac =
                        lo > 0
                            ? (u - cdf[lo - 1]) / (cdf[lo] - cdf[lo - 1])
                            : u / cdf[0];
                    return tMin + (lo + frac) * step;
                };
            }

            // Trefoil Knot — tube following a (2,3) torus knot path, arc-length sampled
            function generateTorusKnot(count) {
                const pts = [];
                const R = 200,
                    r = 60,
                    p = 2,
                    q = 3,
                    tubeR = 18;
                const curveFn = (t) => [
                    (R + r * Math.cos(q * t)) * Math.cos(p * t),
                    (R + r * Math.cos(q * t)) * Math.sin(p * t),
                    r * Math.sin(q * t),
                ];
                const sampleT = buildArcLengthSampler(
                    curveFn,
                    0,
                    Math.PI * 2,
                    1024,
                );

                for (let i = 0; i < count; i++) {
                    const t = sampleT();
                    const phi = Math.random() * Math.PI * 2;
                    const [cx, cy, cz] = curveFn(t);
                    const dt = 0.001;
                    const [cx2, cy2, cz2] = curveFn(t + dt);
                    let tx = cx2 - cx,
                        ty = cy2 - cy,
                        tz = cz2 - cz;
                    const tl = Math.sqrt(tx * tx + ty * ty + tz * tz);
                    tx /= tl;
                    ty /= tl;
                    tz /= tl;
                    let nx = -ty,
                        ny = tx,
                        nz = 0;
                    const nl = Math.sqrt(nx * nx + ny * ny) || 1;
                    nx /= nl;
                    ny /= nl;
                    const bx = ty * nz - tz * ny,
                        by = tz * nx - tx * nz,
                        bz = tx * ny - ty * nx;
                    const tr = tubeR + (Math.random() - 0.5) * 3;
                    pts.push(
                        cx + (Math.cos(phi) * nx + Math.sin(phi) * bx) * tr,
                        cy + (Math.cos(phi) * ny + Math.sin(phi) * by) * tr,
                        cz + (Math.cos(phi) * nz + Math.sin(phi) * bz) * tr,
                    );
                }
                return new Float32Array(pts);
            }

            // Armillary Sphere — rings defined by plane normals + inner wireframe sphere
            function generateArmillarySphere(count) {
                const pts = [];
                const R = 280;

                // Each ring defined by its plane normal (unit vector)
                const s3 = Math.sqrt(3) / 2,
                    s2 = Math.sqrt(2) / 2;
                const ringNormals = [
                    [0, 1, 0], // equatorial (horizontal)
                    [0, 0, 1], // meridian (vertical, facing Z)
                    [1, 0, 0], // meridian (vertical, facing X)
                    [s2, s2, 0], // tilted 45° around Z
                    [0, s2, s2], // tilted 45° around X
                    [s2, 0, s2], // tilted 45° around Y
                ];

                // Build orthonormal basis (u,v) for each ring plane from its normal n
                const ringBases = ringNormals.map((n) => {
                    const nx = n[0],
                        ny = n[1],
                        nz = n[2];
                    // pick an arbitrary vector not parallel to n
                    let ax = 0,
                        ay = 1,
                        az = 0;
                    if (Math.abs(ny) > 0.9) {
                        ax = 1;
                        ay = 0;
                        az = 0;
                    }
                    // u = normalize(cross(n, a))
                    let ux = ny * az - nz * ay,
                        uy = nz * ax - nx * az,
                        uz = nx * ay - ny * ax;
                    const ul = Math.sqrt(ux * ux + uy * uy + uz * uz);
                    ux /= ul;
                    uy /= ul;
                    uz /= ul;
                    // v = cross(n, u)
                    const vx = ny * uz - nz * uy,
                        vy = nz * ux - nx * uz,
                        vz = nx * uy - ny * ux;
                    return { u: [ux, uy, uz], v: [vx, vy, vz] };
                });

                for (let i = 0; i < count; i++) {
                    const section = Math.random();
                    let x, y, z;
                    if (section < 0.7) {
                        // one of the outer rings
                        const ri = Math.floor(
                            Math.random() * ringNormals.length,
                        );
                        const { u, v } = ringBases[ri];
                        const angle = Math.random() * Math.PI * 2;
                        const rr = R + (Math.random() - 0.5) * 5;
                        const ca = Math.cos(angle),
                            sa = Math.sin(angle);
                        x = (u[0] * ca + v[0] * sa) * rr;
                        y = (u[1] * ca + v[1] * sa) * rr;
                        z = (u[2] * ca + v[2] * sa) * rr;
                    } else if (section < 0.85) {
                        // inner wireframe sphere (lat/lon)
                        const innerR = R * 0.45;
                        if (Math.random() < 0.5) {
                            const lat =
                                ((Math.floor(Math.random() * 7) - 3) / 3.5) *
                                (Math.PI / 2);
                            const angle = Math.random() * Math.PI * 2;
                            const r = innerR * Math.cos(lat);
                            y = innerR * Math.sin(lat);
                            x = Math.cos(angle) * r;
                            z = Math.sin(angle) * r;
                        } else {
                            const lon =
                                (Math.floor(Math.random() * 8) / 8) *
                                Math.PI *
                                2;
                            const lat = Math.asin(Math.random() * 2 - 1);
                            const r = innerR * Math.cos(lat);
                            y = innerR * Math.sin(lat);
                            x = Math.cos(lon) * r;
                            z = Math.sin(lon) * r;
                        }
                    } else {
                        // polar axis rod
                        const t = Math.random() * 2 - 1;
                        y = t * R * 1.15;
                        x = (Math.random() - 0.5) * 4;
                        z = (Math.random() - 0.5) * 4;
                    }
                    pts.push(
                        x + (Math.random() - 0.5) * 2,
                        y + (Math.random() - 0.5) * 2,
                        z + (Math.random() - 0.5) * 2,
                    );
                }
                return new Float32Array(pts);
            }

            // Klein Bottle — "figure-8" immersion in 3D
            // Klein Bottle — classic "bottle neck through body" immersion
            function generateKleinBottle(count) {
                const pts = [];
                for (let i = 0; i < count; i++) {
                    const u = Math.random() * Math.PI * 2;
                    const v = Math.random() * Math.PI * 2;
                    const cu = Math.cos(u),
                        su = Math.sin(u),
                        cv = Math.cos(v),
                        sv = Math.sin(v);
                    const r = 4 * (1 - cu / 2);
                    let x, y, z;
                    if (u < Math.PI) {
                        // bottom half: body widens, cross-section follows the body direction
                        x = 6 * cu * (1 + su) + r * cv * cu;
                        y = 16 * su + r * cv * su;
                        z = r * sv;
                    } else {
                        // top half: neck goes back, cross-section points inward (−cos(v))
                        x = 6 * cu * (1 + su) - r * cv;
                        y = 16 * su;
                        z = r * sv;
                    }
                    pts.push(
                        x + (Math.random() - 0.5) * 0.3,
                        y + (Math.random() - 0.5) * 0.3,
                        z + (Math.random() - 0.5) * 0.3,
                    );
                }
                const flat = pts;
                let mx = 0,
                    my = 0,
                    mz = 0,
                    maxD = 0;
                const n = count;
                for (let i = 0; i < flat.length; i += 3) {
                    mx += flat[i];
                    my += flat[i + 1];
                    mz += flat[i + 2];
                }
                mx /= n;
                my /= n;
                mz /= n;
                for (let i = 0; i < flat.length; i += 3) {
                    flat[i] -= mx;
                    flat[i + 1] -= my;
                    flat[i + 2] -= mz;
                    const d = Math.sqrt(
                        flat[i] ** 2 + flat[i + 1] ** 2 + flat[i + 2] ** 2,
                    );
                    if (d > maxD) maxD = d;
                }
                const sc = 300 / maxD;
                for (let i = 0; i < flat.length; i++) flat[i] *= sc;
                return new Float32Array(flat);
            }

            // DNA Double Helix
            function generateDNA(count) {
                const pts = [];
                const height = 700,
                    radius = 120,
                    turns = 4;
                for (let i = 0; i < count; i++) {
                    const section = Math.random();
                    let x, y, z;
                    if (section < 0.4) {
                        const t = Math.random();
                        const angle = t * turns * Math.PI * 2;
                        y = t * height - height / 2;
                        x =
                            Math.cos(angle) * radius +
                            (Math.random() - 0.5) * 5;
                        z =
                            Math.sin(angle) * radius +
                            (Math.random() - 0.5) * 5;
                    } else if (section < 0.8) {
                        const t = Math.random();
                        const angle = t * turns * Math.PI * 2 + Math.PI;
                        y = t * height - height / 2;
                        x =
                            Math.cos(angle) * radius +
                            (Math.random() - 0.5) * 5;
                        z =
                            Math.sin(angle) * radius +
                            (Math.random() - 0.5) * 5;
                    } else {
                        const t = Math.random();
                        const rungT = Math.random();
                        const a1 = t * turns * Math.PI * 2,
                            a2 = a1 + Math.PI;
                        const x1 = Math.cos(a1) * radius,
                            z1 = Math.sin(a1) * radius;
                        const x2 = Math.cos(a2) * radius,
                            z2 = Math.sin(a2) * radius;
                        y = t * height - height / 2;
                        x = x1 + (x2 - x1) * rungT + (Math.random() - 0.5) * 3;
                        z = z1 + (z2 - z1) * rungT + (Math.random() - 0.5) * 3;
                    }
                    pts.push(x, y, z);
                }
                return new Float32Array(pts);
            }

            // Globe — wireframe with lat/lon + axis + orbit, area-correct sampling
            // Möbius Strip — single-sided surface, arc-length corrected
            function generateMobius(count) {
                const pts = [];
                const R = 250,
                    W = 100;
                for (let i = 0; i < count; i++) {
                    const u = Math.random() * Math.PI * 2;
                    const v = (Math.random() * 2 - 1) * W * 0.5;
                    const halfU = u * 0.5;
                    const x = (R + v * Math.cos(halfU)) * Math.cos(u);
                    const y = (R + v * Math.cos(halfU)) * Math.sin(u);
                    const z = v * Math.sin(halfU);
                    pts.push(
                        x + (Math.random() - 0.5) * 3,
                        y + (Math.random() - 0.5) * 3,
                        z + (Math.random() - 0.5) * 3,
                    );
                }
                return new Float32Array(pts);
            }

            // Load & process external binary point cloud (center + scale + downsample)
            function processBinaryModel(raw, targetCount) {
                const srcCount = raw.length / 3;
                if (srcCount <= 0) return new Float32Array(targetCount * 3);

                // 1. 先进行清洗，确保所有输入都是有限数值
                for (let i = 0; i < raw.length; i++) {
                    if (!isFinite(raw[i])) raw[i] = 0;
                }

                // 2. 计算中心点
                let mx = 0,
                    my = 0,
                    mz = 0;
                for (let i = 0; i < raw.length; i += 3) {
                    mx += raw[i];
                    my += raw[i + 1];
                    mz += raw[i + 2];
                }
                mx /= srcCount;
                my /= srcCount;
                mz /= srcCount;

                // 3. 居中并寻找最大半径
                let maxD = 0;
                for (let i = 0; i < raw.length; i += 3) {
                    raw[i] -= mx;
                    raw[i + 1] -= my;
                    raw[i + 2] -= mz;
                    const d = Math.sqrt(
                        raw[i] ** 2 + raw[i + 1] ** 2 + raw[i + 2] ** 2,
                    );
                    if (d > maxD) maxD = d;
                }

                // 4. 缩放到目标尺寸
                const sc = 300 / Math.max(1e-6, maxD);
                for (let i = 0; i < raw.length; i++) {
                    raw[i] *= sc;
                }

                if (srcCount === targetCount) return raw;

                const out = new Float32Array(targetCount * 3);
                if (srcCount < targetCount) {
                    for (let i = 0; i < targetCount; i++) {
                        const si = (i % srcCount) * 3;
                        out[i * 3] = raw[si];
                        out[i * 3 + 1] = raw[si + 1];
                        out[i * 3 + 2] = raw[si + 2];
                    }
                } else {
                    const step = srcCount / targetCount;
                    for (let i = 0; i < targetCount; i++) {
                        const si =
                            Math.min(Math.floor(i * step), srcCount - 1) * 3;
                        out[i * 3] = raw[si];
                        out[i * 3 + 1] = raw[si + 1];
                        out[i * 3 + 2] = raw[si + 2];
                    }
                }
                return out;
            }

            // Apply scale to math-generated models
            function scaleData(data, s) {
                for (let i = 0; i < data.length; i++) data[i] *= s;
                return data;
