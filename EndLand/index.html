            async function loadBinModel(
                path,
                key,
                name,
                scale = 1,
                shiftDownY = 0,
            ) {
                const r = await fetch(path);
                if (!r.ok) throw new Error(path + " " + r.status);
                const buf = await r.arrayBuffer();
                const data = processBinaryModel(
                    new Float32Array(buf),
                    POINT_COUNT,
                );
                if (scale !== 1) {
                    for (let i = 0; i < data.length; i++) data[i] *= scale;
                }
                if (Number.isFinite(shiftDownY) && shiftDownY !== 0) {
                    for (let i = 0; i < data.length; i += 3)
                        data[i + 1] -= shiftDownY;
                }
                return { key, name, data };
            }

            function halton(index, base) {
                let f = 1;
                let r = 0;
                let i = index;
                while (i > 0) {
                    f /= base;
                    r += f * (i % base);
                    i = Math.floor(i / base);
                }
                return r;
            }

            function barycentricFromSequence(index, jitter = 0) {
                let u = halton(index + 1, 2);
                let v = halton(index + 1, 3);
                if (jitter > 0) {
                    u = (u + halton(index + 1, 5) * jitter) % 1;
                    v = (v + halton(index + 1, 7) * jitter) % 1;
                }
                if (u + v > 1) {
                    u = 1 - u;
                    v = 1 - v;
                }
                return [1 - u - v, u, v];
            }

            function collectGeometryTriangles(geometry) {
                const src = geometry.index
                    ? geometry.toNonIndexed()
                    : geometry.clone();
                const posAttr = src.getAttribute("position");
                if (!posAttr || posAttr.count < 3) {
                    if (src !== geometry) src.dispose();
                    return { triangles: [], totalArea: 0 };
                }

                const triangles = [];
                let totalArea = 0;
                const triCount = Math.floor(posAttr.count / 3);
                for (let i = 0; i < triCount; i++) {
                    const a = i * 3;
                    const ax = posAttr.getX(a),
                        ay = posAttr.getY(a),
                        az = posAttr.getZ(a);
                    const bx = posAttr.getX(a + 1),
                        by = posAttr.getY(a + 1),
                        bz = posAttr.getZ(a + 1);
                    const cx = posAttr.getX(a + 2),
                        cy = posAttr.getY(a + 2),
                        cz = posAttr.getZ(a + 2);
                    const abx = bx - ax,
                        aby = by - ay,
                        abz = bz - az;
                    const acx = cx - ax,
                        acy = cy - ay,
                        acz = cz - az;
                    const crossX = aby * acz - abz * acy;
                    const crossY = abz * acx - abx * acz;
                    const crossZ = abx * acy - aby * acx;
                    const crossLen = Math.sqrt(
                        crossX * crossX + crossY * crossY + crossZ * crossZ,
                    );
                    const area = 0.5 * crossLen;
                    if (area <= 1e-8) continue;
                    const invLen = 1 / crossLen;
                    triangles.push({
                        base: a,
                        area,
                        normal: [
                            crossX * invLen,
                            crossY * invLen,
                            crossZ * invLen,
                        ],
                    });
                    totalArea += area;
                }
                if (src !== geometry) src.dispose();
                return { triangles, totalArea };
            }

            function collectGeometryEdges(
                geometry,
                triangleInfo = null,
                sharpAngleDeg = HK3_SHARP_EDGE_DEG,
            ) {
                const info = triangleInfo || collectGeometryTriangles(geometry);
                const triangles = info.triangles;
                if (!triangles.length) return { edges: [], totalLength: 0 };

                const src = geometry.index
                    ? geometry.toNonIndexed()
                    : geometry.clone();
                const posAttr = src.getAttribute("position");
                const edgeMap = new Map();
                const cosThreshold = Math.cos((sharpAngleDeg * Math.PI) / 180);
                const quantize = (v) => Math.round(v * 10000);

                const addEdge = (ax, ay, az, bx, by, bz, normal) => {
                    const aKey = `${quantize(ax)},${quantize(ay)},${quantize(az)}`;
                    const bKey = `${quantize(bx)},${quantize(by)},${quantize(bz)}`;
                    const key =
                        aKey < bKey ? `${aKey}|${bKey}` : `${bKey}|${aKey}`;
                    let entry = edgeMap.get(key);
                    if (!entry) {
                        entry = { ax, ay, az, bx, by, bz, normals: [normal] };
                        edgeMap.set(key, entry);
                    } else {
                        entry.normals.push(normal);
                    }
                };

                for (let i = 0; i < triangles.length; i++) {
                    const base = triangles[i].base;
                    const normal = triangles[i].normal;
                    const ax = posAttr.getX(base),
                        ay = posAttr.getY(base),
                        az = posAttr.getZ(base);
                    const bx = posAttr.getX(base + 1),
                        by = posAttr.getY(base + 1),
                        bz = posAttr.getZ(base + 1);
                    const cx = posAttr.getX(base + 2),
                        cy = posAttr.getY(base + 2),
                        cz = posAttr.getZ(base + 2);
                    addEdge(ax, ay, az, bx, by, bz, normal);
                    addEdge(bx, by, bz, cx, cy, cz, normal);
                    addEdge(cx, cy, cz, ax, ay, az, normal);
                }

                const edges = [];
                let totalLength = 0;
                edgeMap.forEach((entry) => {
                    const dx = entry.bx - entry.ax;
                    const dy = entry.by - entry.ay;
                    const dz = entry.bz - entry.az;
                    const length = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    if (length <= 1e-6) return;

                    let isSharp = entry.normals.length === 1;
                    if (!isSharp && entry.normals.length >= 2) {
                        const n0 = entry.normals[0];
                        const n1 = entry.normals[1];
                        const dot =
                            n0[0] * n1[0] + n0[1] * n1[1] + n0[2] * n1[2];
                        isSharp = dot <= cosThreshold;
                    }
                    if (!isSharp) return;

                    edges.push({ ...entry, length });
                    totalLength += length;
                });

                if (src !== geometry) src.dispose();
                return { edges, totalLength };
            }

            function sampleSharpEdges(edgeInfo, sampleCount) {
                const edges = edgeInfo?.edges || [];
                const totalLength = edgeInfo?.totalLength || 0;
                if (!edges.length || totalLength <= 0 || sampleCount <= 0) {
                    return {
                        points: new Float32Array(0),
                        length: totalLength || 0,
                    };
                }

                const assigned = new Array(edges.length).fill(0);
                const remainders = new Array(edges.length).fill(0);
                let used = 0;
                for (let i = 0; i < edges.length; i++) {
                    const exact = sampleCount * (edges[i].length / totalLength);
                    const count = Math.floor(exact);
                    assigned[i] = count;
                    remainders[i] = exact - count;
                    used += count;
                }
                let remaining = sampleCount - used;
                if (remaining > 0) {
                    const order = remainders
                        .map((value, index) => ({ value, index }))
                        .sort((a, b) => b.value - a.value);
                    for (let i = 0; i < remaining; i++)
                        assigned[order[i % order.length].index]++;
                }

                const out = new Float32Array(sampleCount * 3);
                let outIndex = 0;
                let seq = 0;
                for (let i = 0; i < edges.length; i++) {
                    const count = assigned[i];
                    if (!count) continue;
                    const edge = edges[i];
                    for (let j = 0; j < count; j++) {
                        const t = (j + halton(seq + 1, 2) * 0.35) / count;
                        out[outIndex++] = edge.ax + (edge.bx - edge.ax) * t;
                        out[outIndex++] = edge.ay + (edge.by - edge.ay) * t;
                        out[outIndex++] = edge.az + (edge.bz - edge.az) * t;
                        seq++;
                    }
                }
                return { points: out, length: totalLength };
            }

            function sampleGeometrySurface(
                geometry,
                sampleCount,
                precomputed = null,
            ) {
                const info = precomputed || collectGeometryTriangles(geometry);
                const triangles = info.triangles;
                const totalArea = info.totalArea;
                if (!triangles.length || totalArea <= 0 || sampleCount <= 0) {
                    return {
                        points: new Float32Array(0),
                        area: totalArea || 0,
                    };
                }

                const src = geometry.index
                    ? geometry.toNonIndexed()
                    : geometry.clone();
                const posAttr = src.getAttribute("position");
                const assigned = new Array(triangles.length).fill(0);
                const remainders = new Array(triangles.length).fill(0);
                let used = 0;

                for (let i = 0; i < triangles.length; i++) {
                    const exact = sampleCount * (triangles[i].area / totalArea);
                    const count = Math.floor(exact);
                    assigned[i] = count;
                    remainders[i] = exact - count;
                    used += count;
                }

                let remaining = sampleCount - used;
                if (remaining > 0) {
                    const order = remainders
                        .map((value, index) => ({ value, index }))
                        .sort((a, b) => b.value - a.value);
                    for (let i = 0; i < remaining; i++)
                        assigned[order[i % order.length].index]++;
                }

                const out = new Float32Array(sampleCount * 3);
                let outIndex = 0;
                let sequenceIndex = 0;

                for (let i = 0; i < triangles.length; i++) {
                    const count = assigned[i];
                    if (!count) continue;
                    const base = triangles[i].base;
                    const ax = posAttr.getX(base),
                        ay = posAttr.getY(base),
                        az = posAttr.getZ(base);
                    const bx = posAttr.getX(base + 1),
                        by = posAttr.getY(base + 1),
                        bz = posAttr.getZ(base + 1);
                    const cx = posAttr.getX(base + 2),
                        cy = posAttr.getY(base + 2),
                        cz = posAttr.getZ(base + 2);

                    for (let j = 0; j < count; j++) {
                        const [wa, wb, wc] = barycentricFromSequence(
                            sequenceIndex++,
                            0.35 / Math.max(1, count),
                        );
                        out[outIndex++] = ax * wa + bx * wb + cx * wc;
                        out[outIndex++] = ay * wa + by * wb + cy * wc;
                        out[outIndex++] = az * wa + bz * wb + cz * wc;
                    }
                }

                if (src !== geometry) src.dispose();
                return { points: out, area: totalArea };
            }

            async function loadGlbPointCloud(
                path,
                key,
                name,
                meshName,
                scale = 1,
                shiftDownY = 0,
            ) {
                const loader = new GLTFLoader();
                const gltf = await loader.loadAsync(path);
                const allMeshes = [];
                gltf.scene.updateMatrixWorld(true);
                gltf.scene.traverse((obj) => {
                    if (!obj.isMesh || !obj.geometry) return;
                    allMeshes.push(obj);
                });

                const matchesMeshName = (obj) => {
                    const names = [
                        obj.name,
                        obj.geometry?.name,
                        obj.parent?.name,
                        obj.parent?.parent?.name,
                    ].filter(Boolean);
                    return meshName ? names.includes(meshName) : true;
                };

                let meshes = allMeshes.filter(matchesMeshName);
                if (!meshes.length && meshName) {
                    const excluded = /(sky|cloud)/i;
                    meshes = allMeshes
                        .filter(
                            (obj) =>
                                !excluded.test(
                                    [
                                        obj.name,
                                        obj.geometry?.name,
                                        obj.parent?.name,
                                    ]
                                        .filter(Boolean)
                                        .join(" "),
                                ),
                        )
                        .sort((a, b) => {
                            const ac =
                                a.geometry.getAttribute("position")?.count || 0;
                            const bc =
                                b.geometry.getAttribute("position")?.count || 0;
                            return bc - ac;
                        })
                        .slice(0, 1);
                }
                if (!meshes.length)
                    throw new Error(
                        `No mesh matched ${meshName || "selection"} in ${path}`,
                    );

                const pts = [];
                const meshInfos = meshes
                    .map((mesh) => {
                        const geometryInfo = collectGeometryTriangles(
                            mesh.geometry,
                        );
                        const edgeInfo = collectGeometryEdges(
                            mesh.geometry,
                            geometryInfo,
                        );
                        return {
                            mesh,
                            geometryInfo,
                            edgeInfo,
                            area: geometryInfo.totalArea || 0,
                            edgeLength: edgeInfo.totalLength || 0,
                        };
                    })
                    .filter((info) => info.area > 0);
                const totalArea = meshInfos.reduce(
                    (sum, info) => sum + info.area,
                    0,
                );
                if (totalArea <= 0)
                    throw new Error(`No positive-area mesh found in ${path}`);

                const edgePointBudget = Math.round(
                    POINT_COUNT * HK3_EDGE_POINT_RATIO,
                );
                const surfacePointBudget = Math.max(
                    0,
                    POINT_COUNT - edgePointBudget,
                );
                const totalEdgeLength = meshInfos.reduce(
                    (sum, info) => sum + info.edgeLength,
                    0,
                );

                let assignedSurface = 0;
                let assignedEdge = 0;
                const meshSampleCounts = meshInfos.map((info) => {
                    const surfaceExact =
                        surfacePointBudget * (info.area / totalArea);
                    const surfaceCount = Math.floor(surfaceExact);
                    assignedSurface += surfaceCount;

                    const edgeExact =
                        totalEdgeLength > 0
                            ? edgePointBudget *
                              (info.edgeLength / totalEdgeLength)
                            : 0;
                    const edgeCount = Math.floor(edgeExact);
                    assignedEdge += edgeCount;

                    return {
                        ...info,
                        surfaceCount,
                        edgeCount,
                        surfaceRemainder: surfaceExact - surfaceCount,
                        edgeRemainder: edgeExact - edgeCount,
                    };
                });

                let surfaceRemain = surfacePointBudget - assignedSurface;
                if (surfaceRemain > 0) {
                    meshSampleCounts.sort(
                        (a, b) => b.surfaceRemainder - a.surfaceRemainder,
                    );
                    for (let i = 0; i < surfaceRemain; i++)
                        meshSampleCounts[i % meshSampleCounts.length]
                            .surfaceCount++;
                }

                let edgeRemain = edgePointBudget - assignedEdge;
                if (edgeRemain > 0 && totalEdgeLength > 0) {
                    meshSampleCounts.sort(
                        (a, b) => b.edgeRemainder - a.edgeRemainder,
                    );
                    const eligible = meshSampleCounts.filter(
                        (info) => info.edgeLength > 0,
                    );
                    for (let i = 0; i < edgeRemain && eligible.length; i++)
                        eligible[i % eligible.length].edgeCount++;
                }

                for (const {
                    mesh,
                    surfaceCount,
                    edgeCount,
                    geometryInfo,
                    edgeInfo,
                } of meshSampleCounts) {
                    const posAttr = mesh.geometry.getAttribute("position");
                    if (!posAttr || posAttr.count < 3) continue;

                    if (surfaceCount > 0) {
                        const { points: sampledSurface } =
                            sampleGeometrySurface(
                                mesh.geometry,
                                surfaceCount,
                                geometryInfo,
                            );
                        for (let i = 0; i < sampledSurface.length; i += 3) {
                            const v = new THREE.Vector3(
                                sampledSurface[i],
                                sampledSurface[i + 1],
                                sampledSurface[i + 2],
                            );
                            v.applyMatrix4(mesh.matrixWorld);
                            pts.push(v.x, v.y, v.z);
                        }
                    }

                    if (edgeCount > 0) {
                        const { points: sampledEdges } = sampleSharpEdges(
                            edgeInfo,
                            edgeCount,
                        );
                        for (let i = 0; i < sampledEdges.length; i += 3) {
                            const v = new THREE.Vector3(
                                sampledEdges[i],
                                sampledEdges[i + 1],
                                sampledEdges[i + 2],
                            );
                            v.applyMatrix4(mesh.matrixWorld);
                            pts.push(v.x, v.y, v.z);
                        }
                    }
                }

                if (!pts.length)
                    throw new Error(`No sampled points generated from ${path}`);

                const data = processBinaryModel(
                    new Float32Array(pts),
                    POINT_COUNT,
                );
                if (scale !== 1) {
                    for (let i = 0; i < data.length; i++) data[i] *= scale;
                }
                if (Number.isFinite(shiftDownY) && shiftDownY !== 0) {
                    for (let i = 0; i < data.length; i += 3)
                        data[i + 1] -= shiftDownY;
                }
                return { key, name, data };
            }

            // Raster logo -> point cloud (采样黑色像素)
            function loadLogoPointCloud(url) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => {
                        const maxDim = LOGO_RASTER_MAX_DIM;
                        let cw = img.naturalWidth;
                        let ch = img.naturalHeight;
                        const scale = Math.min(maxDim / cw, maxDim / ch);
                        cw = Math.max(1, Math.round(cw * scale));
                        ch = Math.max(1, Math.round(ch * scale));
                        const canvas = document.createElement("canvas");
                        canvas.width = cw;
                        canvas.height = ch;
                        const ctx = canvas.getContext("2d");
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = "high";
                        ctx.drawImage(img, 0, 0, cw, ch);
                        const { data } = ctx.getImageData(0, 0, cw, ch);
                        const pts = [];
                        for (let y = 0; y < ch; y++) {
                            for (let x = 0; x < cw; x++) {
                                const i = (y * cw + x) * 4;
                                // 只要不是完全透明的像素，都视为前景（点云的一部分）
                                if (data[i + 3] < 128) continue;

                                const nx = (x + 0.5) / cw - 0.5;
                                const ny = -(y + 0.5) / ch + 0.5;
                                pts.push(
                                    nx * 400,
                                    ny * 400,
                                    (Math.random() - 0.5) * LOGO_DEPTH_SPREAD,
                                );
                            }
                        }
                        if (!pts.length)
                            return reject(
                                new Error("no foreground pixels in logo"),
                            );
                        const cloud = processBinaryModel(
                            new Float32Array(pts),
                            POINT_COUNT,
                        );
                        for (let i = 0; i < cloud.length; i++)
                            cloud[i] *= LOGO_MODEL_SCALE;
                        const logoShiftDown = BIN_MODEL_SHIFT_DOWN_Y.logo ?? 0;
                        if (
                            Number.isFinite(logoShiftDown) &&
                            logoShiftDown !== 0
                        ) {
                            for (let i = 0; i < cloud.length; i += 3)
                                cloud[i + 1] -= logoShiftDown;
                        }
                        resolve(cloud);
                    };
                    img.onerror = () =>
                        reject(new Error("logo image load failed"));
                    img.src = url;
                });
            }

            // 目标顺序：
            // 1) logo 采样模型
            // 2+) EXTERNAL_MODEL_DEFS 中定义的 bin / glb 模型
            async function loadExternalModels() {
                let loadDone = 0;
                setLoadingProgress(loadDone, "Loading Core Assets");

                let logoModel = null;
                try {
                    const logoData = await loadLogoPointCloud("logo.png");
                    logoModel = {
                        key: "logo",
                        name: "ENDFIELD 終末地",
                        data: logoData,
                    };
                } catch (err) {
                    console.warn("Failed to load logo.png");
                }
                loadDone++;
                setLoadingProgress(loadDone, "Loading Logo");

                const loaded = [];

                for (let i = 0; i < EXTERNAL_MODEL_DEFS.length; i++) {
                    const [kind, path, key, name, scale, meshName] =
                        EXTERNAL_MODEL_DEFS[i];
                    try {
                        const shiftDown = BIN_MODEL_SHIFT_DOWN_Y[key] ?? 0;
                        let model;
                        if (kind === "glb" || kind === "gltf") {
                            model = await loadGlbPointCloud(
                                path,
                                key,
                                name,
                                meshName,
                                scale,
                                shiftDown,
                            );
                        } else {
                            model = await loadBinModel(
                                path,
                                key,
                                name,
                                scale,
                                shiftDown,
                            );
                        }
                        loaded.push(model);
                    } catch (err) {
                        console.warn("Failed to load model:", path, err);
                    }
                    loadDone++;
                    setLoadingProgress(loadDone, `Loading ${name}`);
                }

                models = logoModel ? [logoModel, ...loaded] : loaded;
            }

            // ──────────────────────────────────────────
            // 2. Shaders — scatter / reform transition
            // ──────────────────────────────────────────
            const vertexShader = `
  attribute vec3 posFrom;       // old model (or scattered for init)
  attribute vec3 scatterPos;    // random far-away position
  attribute vec3 pointData;     // x=size, y=delay(0~1), z=random

  uniform float progress;       // 0→1: from→scatter→target（JS 侧按两段时长映射到 0~1）
  uniform float cameraFadeDistance;
  uniform float cameraFadeStart;
  uniform float pointSizeScale;
  // Glitch uniforms: each vec4 = (yStart, yEnd, xOffset, intensity)
  uniform vec4 glitchEffects0;
  uniform vec4 glitchEffects1;
  uniform vec4 glitchEffects2;
  uniform vec4 glitchEffects3;

  varying float vAlpha;
  varying vec3 vColor;
  varying float vDistanceAlpha;

  float easeIn(float t)  { return t * t * t; }
  float easeOut(float t) { float u = 1.0 - t; return 1.0 - u * u * u; }

  void main() {
    float size = pointData.x;
    float delay = pointData.y;

    float stagger = 0.3;
    float p = clamp((progress - delay * stagger) / (1.0 - stagger), 0.0, 1.0);

    vec3 pos;
    float alpha;

    if (p <= 0.5) {
      float t = easeIn(p * 2.0);
      pos = mix(posFrom, scatterPos, t);
      alpha = mix(0.7, 0.15, t);
    } else {
      float t = easeOut((p - 0.5) * 2.0);
      pos = mix(scatterPos, position, t);
      alpha = mix(0.15, 0.7, t);
    }

    float scatterAmount = 1.0 - abs(p - 0.5) * 2.0;
    vColor = mix(vec3(0.75, 0.75, 0.75), vec3(1.0, 0.95, 0.5), scatterAmount * 0.5);

    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
    float viewZ = -mvPosition.z;
    float distanceAlpha = 1.0 - clamp((viewZ - cameraFadeStart) / (cameraFadeDistance - cameraFadeStart), 0.0, 1.0);
    vAlpha = alpha * distanceAlpha;
    vDistanceAlpha = distanceAlpha;

    gl_Position = projectionMatrix * mvPosition;
    gl_PointSize = size * pointSizeScale * distanceAlpha + 1.0;

    // Glitch: horizontal offset for screen-space bands
    vec2 screenPos = gl_Position.xy / gl_Position.w;
    float sy = screenPos.y * 0.5 + 0.5; // normalized 0..1
    vec4 bands[4];
    bands[0] = glitchEffects0;
    bands[1] = glitchEffects1;
    bands[2] = glitchEffects2;
    bands[3] = glitchEffects3;
    for (int j = 0; j < 4; j++) {
      float yStart = bands[j].x;
      float yEnd   = bands[j].y;
      float xOff   = bands[j].z;
      float inten  = bands[j].w;
      if (inten > 0.0 && sy >= yStart && sy <= yEnd) {
        gl_Position.x += xOff * inten * gl_Position.w;
      }
    }
  }
`;

            const fragmentShader = `
  varying float vAlpha;
  varying vec3 vColor;
  varying float vDistanceAlpha;

  uniform float coreRadius;
  uniform float innerGlowStrength;
  uniform float compressStrength;

  void main() {
    vec2 center = gl_PointCoord - vec2(0.5);
    float dist = length(center);
    if (dist > 0.5) discard;

    float alpha = vAlpha;
    if (dist > coreRadius * vDistanceAlpha) {
      float fadeOut = smoothstep(0.5, coreRadius, dist);
      float distanceFade = 1.0 - pow(dist / 0.5, 2.0);
      alpha = vAlpha * fadeOut * distanceFade;
    }

    float innerGlow = 1.0 - smoothstep(0.0, coreRadius * 3.0, dist);
    vec3 finalColor = vColor + vColor * innerGlow * innerGlowStrength;
    vec3 compressed = finalColor / (finalColor + vec3(1.0));
    finalColor = mix(finalColor, compressed, compressStrength);


    gl_FragColor = vec4(finalColor, alpha);
  }
`;

            // ──────────────────────────────────────────
            // 3. Scene Setup
            // ──────────────────────────────────────────
            const container = document.getElementById("canvas-container");
            const renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true,
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(
                75,
                window.innerWidth / window.innerHeight,
                0.1,
                10000,
            );
            camera.position.set(0, 0, CAMERA_DISTANCE);

            // ──────────────────────────────────────────
            // 4. Helpers
            // ──────────────────────────────────────────
            function generateScatterPositions(count) {
                const arr = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    const r =
                        SCATTER_RADIUS[0] +
                        Math.random() * (SCATTER_RADIUS[1] - SCATTER_RADIUS[0]);
                    arr[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                    arr[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                    arr[i * 3 + 2] = r * Math.cos(phi);
                }
                return arr;
            }

            function buildPointData(count) {
                const arr = new Float32Array(count * 3);
                for (let i = 0; i < count; i++) {
                    arr[i * 3] =
                        POINT_SIZE_RANGE[0] +
                        Math.random() *
                            (POINT_SIZE_RANGE[1] - POINT_SIZE_RANGE[0]); // size
                    arr[i * 3 + 1] = Math.random(); // delay (0~1)
                    arr[i * 3 + 2] = Math.random(); // random
                }
                return arr;
            }

            // ──────────────────────────────────────────
            // 5. Point Cloud
            // ──────────────────────────────────────────
            const group = new THREE.Group();
            scene.add(group);

            function getAdaptivePointSizeScale() {
                // 用“物理像素短边”适配，尽量消除系统缩放/DPR导致的跨设备不一致
                const dpr = Math.max(1, window.devicePixelRatio || 1);
                const shortEdgePx =
                    Math.min(window.innerWidth, window.innerHeight) * dpr;
                const t = Math.max(
                    0,
                    Math.min(1, (shortEdgePx - 900) / (2400 - 900)),
                );
                // 物理分辨率越高，点越大；越低，点越小
                const adaptive = 2.8 + (5.0 - 2.8) * t;
                return Math.round(adaptive * 10) / 10;
            }

            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(POINT_COUNT * 3);
            const posFrom = new Float32Array(POINT_COUNT * 3);
            const scatterP = generateScatterPositions(POINT_COUNT);
            const pData = buildPointData(POINT_COUNT);

            geometry.setAttribute(
                "position",
                new THREE.BufferAttribute(positions, 3),
            );
            geometry.setAttribute(
                "posFrom",
                new THREE.BufferAttribute(posFrom, 3),
            );
            geometry.setAttribute(
                "scatterPos",
                new THREE.BufferAttribute(scatterP, 3),
            );
            geometry.setAttribute(
                "pointData",
                new THREE.BufferAttribute(pData, 3),
            );

            const material = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms: {
                    progress: { value: 1.0 },
                    cameraFadeDistance: { value: 4000 },
                    cameraFadeStart: { value: 800 },
                    pointSizeScale: { value: POINT_SIZE_SCALE },
                    glitchEffects0: { value: new THREE.Vector4(0, 0, 0, 0) },
                    glitchEffects1: { value: new THREE.Vector4(0, 0, 0, 0) },
                    glitchEffects2: { value: new THREE.Vector4(0, 0, 0, 0) },
                    glitchEffects3: { value: new THREE.Vector4(0, 0, 0, 0) },
                    coreRadius: { value: 0.08 },
                    innerGlowStrength: { value: 0.3 },
                    compressStrength: { value: 0.5 },
                },
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
            });

            const pointsMesh = new THREE.Points(geometry, material);
            group.add(pointsMesh);

            // ──────────────────────────────────────────
            // 6. Animation Helper
            // ──────────────────────────────────────────
            function easeInOutCubic(t) {
                return t < 0.5
                    ? 4 * t * t * t
                    : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            // 递增即取消所有未完成的 animateValue（避免与初始飞入 / 其它进度动画打架）
            let progressAnimGeneration = 0;
            function cancelProgressAnimations() {
                progressAnimGeneration++;
            }

            function animateValue(
                from,
                to,
                duration,
                onUpdate,
                onComplete,
                delay = 0,
            ) {
                const myGen = ++progressAnimGeneration;
                const start = performance.now() + delay;
                function tick() {
                    if (myGen !== progressAnimGeneration) return;
                    const now = performance.now();
                    if (now < start) {
                        requestAnimationFrame(tick);
                        return;
                    }
                    const t = Math.min(1, (now - start) / duration);
                    onUpdate(from + (to - from) * easeInOutCubic(t));
                    if (t < 1) requestAnimationFrame(tick);
                    else if (onComplete) onComplete();
                }
                requestAnimationFrame(tick);
            }

            /** 切回第一个模型时水平角插值用的角差：与 (to-from) 同余 mod 2π，且 |d| ≤ maxFullRotations×2π；maxFullRotations≤0 时仅用最短角路径 */
            function angleDeltaBlendTheta(from, to, maxFullRotations) {
                const maxRad = maxFullRotations * 2 * Math.PI;
                let d = to - from;
                if (maxRad <= 0) {
                    d -= Math.round(d / (2 * Math.PI)) * (2 * Math.PI);
                    return d;
                }
                while (Math.abs(d) > maxRad) {
                    d -= Math.sign(d) * 2 * Math.PI;
                }
                return d;
            }

            // ──────────────────────────────────────────
            // 7. Model Switching (scatter / reform)
            // ──────────────────────────────────────────
            let currentModelIndex = 0;
            let isSwitching = false;

            async function switchToModel(index) {
                if (isSwitching || index === currentModelIndex) return;
                // 必须先取消初始飞入的 animateValue，否则后续帧仍会写 progress，与本次切换冲突（多帧闪屏）
                cancelProgressAnimations();
                isSwitching = true;
                stopGlitchLoop();
                currentModelIndex = index;
                const model = models[index];

                if (FIRST_MODEL_NO_AUTO_ROT && index === 0) {
                    const tt = FIRST_MODEL_VIEW_THETA;
                    const deltaTheta = angleDeltaBlendTheta(
                        currentTheta,
                        tt,
                        MAX_BLEND_FULL_ROTATIONS_TO_FIRST,
                    );
                    cameraBlendToFirst = {
                        start: performance.now(),
                        duration: SCATTER_OUT_MS + SCATTER_IN_MS,
                        fromTheta: currentTheta,
                        fromPhi: currentPhi,
                        deltaTheta,
                    };
                } else {
                    cameraBlendToFirst = null;
                }

                const posAttr = geometry.getAttribute("position");
                const fromAttr = geometry.getAttribute("posFrom");
                for (let i = 0; i < POINT_COUNT * 3; i++)
                    fromAttr.array[i] = posAttr.array[i];
                fromAttr.needsUpdate = true;

                for (let i = 0; i < POINT_COUNT * 3; i++) {
                    const val = model.data[i];
                    posAttr.array[i] = isNaN(val) ? 0 : val;
                }
                posAttr.needsUpdate = true;
                geometry.computeBoundingSphere();

                const newScatter = generateScatterPositions(POINT_COUNT);
                const scatterAttr = geometry.getAttribute("scatterPos");
                for (let i = 0; i < POINT_COUNT * 3; i++)
                    scatterAttr.array[i] = newScatter[i];
                scatterAttr.needsUpdate = true;

                const newPD = buildPointData(POINT_COUNT);
                const pdAttr = geometry.getAttribute("pointData");
                for (let i = 0; i < POINT_COUNT * 3; i++)
                    pdAttr.array[i] = newPD[i];
                pdAttr.needsUpdate = true;

                const oldSpeed = autoRotationSpeed;
                animateValue(oldSpeed, oldSpeed * 8, 300, (v) => {
                    autoRotationSpeed = v;
                });
                setTimeout(() => {
                    animateValue(autoRotationSpeed, oldSpeed, 1000, (v) => {
                        autoRotationSpeed = v;
                    });
                }, 1500);

                material.uniforms.progress.value = 0;
                const totalMs = SCATTER_OUT_MS + SCATTER_IN_MS;
                const midRatio = SCATTER_OUT_MS / totalMs;
                let uiSwitchedAtReform = false;
                await new Promise((resolve) => {
                    const start = performance.now();
                    function tick() {
                        const t = Math.min(
                            1,
                            (performance.now() - start) / totalMs,
                        );
                        let p;
                        if (t < midRatio) {
                            const st = t / midRatio;
                            p = st * st * 0.5;
                        } else {
                            const st = (t - midRatio) / (1 - midRatio);
                            p = 0.5 + (1 - (1 - st) * (1 - st)) * 0.5;
                        }
                        material.uniforms.progress.value = p;
                        // 进入聚拢阶段即更新 UI，而不是等完整切换结束
                        if (!uiSwitchedAtReform && p >= 0.5) {
                            updateNav();
                            animateModelTitle(model.name);
                            updateHudStatic();
                            uiSwitchedAtReform = true;
                        }
                        if (t < 1) requestAnimationFrame(tick);
                        else resolve();
                    }
                    requestAnimationFrame(tick);
                });

                isSwitching = false;
                if (!uiSwitchedAtReform) {
                    // 兜底：极端情况下仍确保 UI 最终正确
                    updateNav();
                    animateModelTitle(model.name);
                    updateHudStatic();
                }
                triggerGlitchOnce();
            }

            // ──────────────────────────────────────────
            // 7b. Glitch Effect (random horizontal band displacement)
            // ──────────────────────────────────────────
            let glitchTimer = null;

            function setGlitch(index, yStart, yEnd, xOffset, intensity) {
                const key = "glitchEffects" + index;
                material.uniforms[key].value.set(
                    yStart,
                    yEnd,
                    xOffset,
                    intensity,
                );
            }

            function clearAllGlitch() {
                for (let i = 0; i < 4; i++) setGlitch(i, 0, 0, 0, 0);
            }

            function activateGlitch() {
                const bandCount = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < 4; i++) {
                    if (i < bandCount) {
                        const yStart = Math.random() * 0.8;
                        const bandH = 0.02 + Math.random() * 0.06;
                        const xOff = (Math.random() - 0.5) * 0.08;
                        setGlitch(i, yStart, yStart + bandH, xOff, 1.0);
                    } else {
                        setGlitch(i, 0, 0, 0, 0);
                    }
                }
                const duration = 40 + Math.random() * 80;
                setTimeout(clearAllGlitch, duration);
            }

            function triggerGlitchOnce() {
                stopGlitchLoop();
                if (isSwitching) return;
                activateGlitch();
            }

            function stopGlitchLoop() {
                if (glitchTimer) {
                    clearTimeout(glitchTimer);
                    glitchTimer = null;
                }
                clearAllGlitch();
            }

            function animateModelTitle(name) {
                const el = document.getElementById("model-name");
                if (!el) return;
                el.textContent = name;
            }

            function updateHudStatic() {
                // Static info simplified
            }

            function updateHudDynamic() {
                const now = new Date();
                const timeEl = document.getElementById("hud-time");
                const orbitEl = document.getElementById("hud-orbit");
                const timeText = now.toLocaleTimeString("zh-CN", {
                    hour12: false,
                });
                if (timeEl) timeEl.textContent = timeText;

                if (orbitEl) {
                    const yaw =
                        ((((currentTheta * 180) / Math.PI) % 360) + 360) % 360;
                    const pitch = (currentPhi * 180) / Math.PI;
                    const orbitText = `${yaw.toFixed(0)}° / ${pitch.toFixed(0)}°`;
                    orbitEl.textContent = orbitText;
                }
            }

            function updateSliderFill(id, val, min, max) {
                const fill = document.getElementById(id + "-fill");
                if (fill) {
                    const percent = ((val - min) / (max - min)) * 100;
                    fill.style.width = percent + "%";
                }
            }

            // ──────────────────────────────────────────
            // 8. Orbit Camera Interaction (spherical coords)
            // ──────────────────────────────────────────
            let autoRotation = true;
            let autoRotationSpeed = AUTO_ROTATION_SPEED;
            let isDragging = false;
            let dragStartX = 0,
                dragStartY = 0;

            // Spherical: theta = horizontal angle, phi = vertical angle (clamped)
            let targetTheta = 0,
                targetPhi = Math.PI / 2;
            let currentTheta = 0,
                currentPhi = Math.PI / 2;
            const PHI_MIN = 0.15,
                PHI_MAX = Math.PI - 0.15;
            /** 切回第一个模型时，与粒子过渡同长的相机插值（避免视角瞬间跳变） */
            let cameraBlendToFirst = null;

            container.addEventListener("mousedown", (e) => {
                isDragging = true;
                cameraBlendToFirst = null;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                container.style.cursor = "grabbing";
            });
            window.addEventListener("mousemove", (e) => {
                if (!isDragging) return;
                const dx = e.clientX - dragStartX,
                    dy = e.clientY - dragStartY;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                targetTheta -= dx * 0.005;
                targetPhi = Math.max(
                    PHI_MIN,
                    Math.min(PHI_MAX, targetPhi - dy * 0.005),
                );
            });
            window.addEventListener("mouseup", () => {
                isDragging = false;
                container.style.cursor = "grab";
            });

            container.addEventListener("touchstart", (e) => {
                if (e.touches.length === 1) {
                    isDragging = true;
                    cameraBlendToFirst = null;
                    dragStartX = e.touches[0].clientX;
                    dragStartY = e.touches[0].clientY;
                }
            });
            window.addEventListener("touchmove", (e) => {
                if (!isDragging || e.touches.length !== 1) return;
                const dx = e.touches[0].clientX - dragStartX,
                    dy = e.touches[0].clientY - dragStartY;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                targetTheta -= dx * 0.005;
                targetPhi = Math.max(
                    PHI_MIN,
                    Math.min(PHI_MAX, targetPhi - dy * 0.005),
                );
            });
            window.addEventListener("touchend", () => {
                isDragging = false;
            });
            container.style.cursor = "grab";

            // Zoom: mouse wheel / trackpad
            const ZOOM_MIN = 80,
                ZOOM_MAX = 2000,
                ZOOM_SPEED = 0.1;
            let targetZoom = CAMERA_DISTANCE,
                currentZoom = CAMERA_DISTANCE;

            container.addEventListener(
                "wheel",
                (e) => {
                    e.preventDefault();
                    targetZoom *= 1 + e.deltaY * ZOOM_SPEED * 0.01;
                    targetZoom = Math.max(
                        ZOOM_MIN,
                        Math.min(ZOOM_MAX, targetZoom),
                    );
                },
                { passive: false },
            );

            // Touch pinch zoom
            let lastPinchDist = 0;
            container.addEventListener("touchstart", (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    lastPinchDist = Math.sqrt(dx * dx + dy * dy);
                }
            });
            container.addEventListener("touchmove", (e) => {
                if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (lastPinchDist > 0) {
                        targetZoom *= lastPinchDist / dist;
                        targetZoom = Math.max(
                            ZOOM_MIN,
                            Math.min(ZOOM_MAX, targetZoom),
                        );
                    }
                    lastPinchDist = dist;
                }
            });

            // ──────────────────────────────────────────
            // 10. Render Loop
            // ──────────────────────────────────────────
            function animate() {
                requestAnimationFrame(animate);
                const bg = document.getElementById("ambient-bg");
                if (bg) {
                    const t = performance.now() * 0.00012;
                    const tx = Math.sin(t) * 28;
                    const ty = Math.cos(t * 1.35) * 22;
                    const rot = Math.sin(t * 0.45) * 1.8;
                    const breathe =
                        0.25 + 0.17 * (Math.sin(t * 0.7) * 0.5 + 0.5);
                    const opacity = Math.max(
                        0,
                        Math.min(1, breathe * ambientGridGain),
                    );
                    bg.style.opacity = opacity.toFixed(3);
                    bg.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(1.03)`;
                }
                if (
                    autoRotation &&
                    !isDragging &&
                    !(FIRST_MODEL_NO_AUTO_ROT && currentModelIndex === 0)
                ) {
                    targetTheta += autoRotationSpeed;
                }

                if (cameraBlendToFirst) {
                    const t = Math.min(
                        1,
                        (performance.now() - cameraBlendToFirst.start) /
                            cameraBlendToFirst.duration,
                    );
                    const e = easeInOutCubic(t);
                    const tt = FIRST_MODEL_VIEW_THETA;
                    const tp = FIRST_MODEL_VIEW_PHI;
                    currentTheta =
                        cameraBlendToFirst.fromTheta +
                        cameraBlendToFirst.deltaTheta * e;
                    targetTheta = currentTheta;
                    currentPhi =
                        cameraBlendToFirst.fromPhi +
                        (tp - cameraBlendToFirst.fromPhi) * e;
                    targetPhi = currentPhi;
                    if (t >= 1) {
                        currentTheta = tt;
                        targetTheta = tt;
                        currentPhi = tp;
                        targetPhi = tp;
                        cameraBlendToFirst = null;
                    }
                } else {
                    currentTheta += (targetTheta - currentTheta) * 0.1;
                    currentPhi += (targetPhi - currentPhi) * 0.1;
                }
                currentZoom += (targetZoom - currentZoom) * 0.1;

                // Spherical → Cartesian
                camera.position.x =
                    currentZoom * Math.sin(currentPhi) * Math.sin(currentTheta);
                camera.position.y = currentZoom * Math.cos(currentPhi);
                camera.position.z =
                    currentZoom * Math.sin(currentPhi) * Math.cos(currentTheta);

                // 画面微动：给镜头一个很小的漂移，避免长时间静止发呆
                const driftT = performance.now() * CAMERA_DRIFT_SPEED;
                camera.position.x += Math.sin(driftT) * CAMERA_DRIFT_X;
                camera.position.y += Math.cos(driftT * 1.37) * CAMERA_DRIFT_Y;
                camera.position.z += Math.sin(driftT * 0.93) * CAMERA_DRIFT_Z;
                camera.lookAt(0, LOOK_AT_OFFSET_Y, 0);

                updateHudDynamic();
                renderer.render(scene, camera);
            }

            // ──────────────────────────────────────────
            // 11. Nav UI
            // ──────────────────────────────────────────
            const navEl = document.getElementById("nav");

            function buildNav() {
                navEl.innerHTML = "";
                models.forEach((m, i) => {
                    const item = document.createElement("div");
                    item.className = "nav-item" + (i === 0 ? " active" : "");
                    item.innerHTML = `<span class="label">${m.key.substring(0, 3).toUpperCase()}</span>`;
                    item.addEventListener("click", () => switchToModel(i));
                    navEl.appendChild(item);
                });
            }

            document
                .getElementById("prev-btn")
                .addEventListener("click", () => {
                    switchToModel(
                        (currentModelIndex - 1 + models.length) % models.length,
                    );
                });
            document
                .getElementById("next-btn")
                .addEventListener("click", () => {
                    switchToModel((currentModelIndex + 1) % models.length);
                });

            // Point size slider (in HUD)
            const pcSizeSlider = document.getElementById("pc-size-slider");
            const pcSizeValueEl = document.getElementById("pc-size-value");
            const pcRotSlider = document.getElementById("pc-rot-slider");
            const pcRotValueEl = document.getElementById("pc-rot-value");
            const pcGridSlider = document.getElementById("pc-grid-slider");
            const pcGridValueEl = document.getElementById("pc-grid-value");

            function applyPointSize(v) {
                material.uniforms.pointSizeScale.value = v;
                if (pcSizeSlider) {
                    pcSizeSlider.value = v;
                    pcSizeValueEl.textContent = v.toFixed(1);
                    updateSliderFill(
                        "pc-size",
                        v,
                        pcSizeSlider.min,
                        pcSizeSlider.max,
                    );
                }
                updateHudDynamic();
            }

            function applyRotSpeed(v) {
                autoRotationSpeed = v;
                if (pcRotSlider) {
                    pcRotSlider.value = v;
                    pcRotValueEl.textContent = v.toFixed(4);
                    updateSliderFill(
                        "pc-rot",
                        v,
                        pcRotSlider.min,
                        pcRotSlider.max,
                    );
                }
                updateHudDynamic();
            }

            function applyGridGain(v) {
                ambientGridGain = v;
                if (pcGridSlider) {
                    pcGridSlider.value = v;
                    pcGridValueEl.textContent = v.toFixed(2);
                    updateSliderFill(
                        "pc-grid",
                        v,
                        pcGridSlider.min,
                        pcGridSlider.max,
                    );
                }
                updateHudDynamic();
            }
            applyPointSize(POINT_SIZE_SCALE);
            applyRotSpeed(AUTO_ROTATION_SPEED);
            applyGridGain(ambientGridGain);
            if (pcSizeSlider)
                pcSizeSlider.addEventListener("input", () =>
                    applyPointSize(parseFloat(pcSizeSlider.value)),
                );
            if (pcRotSlider)
                pcRotSlider.addEventListener("input", () =>
                    applyRotSpeed(parseFloat(pcRotSlider.value)),
                );
            if (pcGridSlider)
                pcGridSlider.addEventListener("input", () =>
                    applyGridGain(parseFloat(pcGridSlider.value)),
                );

            function updateNav() {
                navEl.querySelectorAll(".nav-item").forEach((item, i) => {
                    item.classList.toggle("active", i === currentModelIndex);
                });
            }

            // ──────────────────────────────────────────
            // 12. Resize
            // ──────────────────────────────────────────
            window.addEventListener("resize", () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // ──────────────────────────────────────────
            // 13. Init — load external models, then fly in
            // ──────────────────────────────────────────
            (async function init() {
                // 伪装：从地址栏隐藏 index.html，并添加一点干扰参数
                if (window.history.replaceState) {
                    const cleanUrl =
                        window.location.protocol +
                        "//" +
                        window.location.host +
                        window.location.pathname.replace("index.html", "") +
                        "?access=neural_link_established";
                    window.history.replaceState(
                        { path: cleanUrl },
                        "",
                        cleanUrl,
                    );
                }

                await loadExternalModels();
                hideLoadingOverlay();
                buildNav();
                updateNav();
                updateHudStatic();

                const initModel = models[0];
                document.getElementById("model-name").textContent =
                    initModel.name;

                // 首次加载按分辨率自适应点大小，并同步到 HUD 滑条
                const adaptiveSize = getAdaptivePointSizeScale();
                applyPointSize(adaptiveSize);

                if (FIRST_MODEL_NO_AUTO_ROT) {
                    targetTheta = FIRST_MODEL_VIEW_THETA;
                    currentTheta = FIRST_MODEL_VIEW_THETA;
                    targetPhi = FIRST_MODEL_VIEW_PHI;
                    currentPhi = FIRST_MODEL_VIEW_PHI;
                }

                const posAttr = geometry.getAttribute("position");
                const fromAttr = geometry.getAttribute("posFrom");
                const scatterAttr = geometry.getAttribute("scatterPos");

                for (let i = 0; i < POINT_COUNT * 3; i++) {
                    const val = initModel.data[i];
                    posAttr.array[i] = isFinite(val) ? val : 0;
                    fromAttr.array[i] = scatterAttr.array[i];
                }
                posAttr.needsUpdate = true;
                fromAttr.needsUpdate = true;
                geometry.computeBoundingSphere();

                material.uniforms.progress.value = 0.5;
                animateValue(
                    0.5,
                    1.0,
                    INIT_FLY_IN_MS,
                    (v) => {
                        material.uniforms.progress.value = v;
                    },
                    () => {
                        triggerGlitchOnce();
                    },
                );

                animate();
            })();
        </script>
    </body>
</html>
