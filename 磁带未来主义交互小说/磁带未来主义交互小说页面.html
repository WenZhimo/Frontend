<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_OVERRIDE // 磁带未来 v3.2 CRT特效版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/runtime/index.css">
</head>
<body>

    <div class="crt-container">
        <!-- 视觉特效层 -->
        <div class="scanlines"></div>       <!-- 静态横纹 -->
        <div class="scan-beam"></div>       <!-- 动态刷新光带 -->
        <div class="flicker-overlay"></div> <!-- 整体微闪烁 -->
        <div class="vignette"></div>        <!-- 边缘暗角 -->
        
        <div class="tape-label">MIXTAPE: MEMORY_04</div>
        
        <div class="screen">
            <div class="header">
                <span>TERMINAL_ID: 88-X</span>
                <span id="clock">00:00:00</span>
            </div>
            
            <div id="story-text" class="cursor"></div>
            
            <div id="choices"></div>
        </div>
    </div>

    <script>
        window.__INLINE_STORY__ = {
            schemaId: 'cassette-if.story/v2',
            format: 'cassette-if',
            version: 2,
            title: '24 号观察站',
            startNodeId: 'start',
            nodes: [
                {
                    id: 'start',
                    image: '',
                    content: [
                        { type: 'text', value: '系统初始化... ' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: ' 内存完整性检查... ' },
                        {
                            type: 'styled',
                            color: '#0f0',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: '通过' }]
                        },
                        { type: 'text', value: '。\n加载磁带数据 [SIDE A]...' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n\n你在一阵低沉的嗡嗡声中醒来。你的视觉传感器正在校准。这里是 ' },
                        {
                            type: 'styled',
                            color: '',
                            underline: true,
                            strike: false,
                            children: [{ type: 'text', value: '24 号观察站' }]
                        },
                        { type: 'text', value: '。空气中弥漫着陈旧的臭氧味。' }
                    ],
                    options: [
                        { text: '检查系统日志', target: 'logs' },
                        { text: '观察四周', target: 'look_around' }
                    ]
                },
                {
                    id: 'logs',
                    image: '',
                    content: [
                        { type: 'text', value: '访问中...' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: ' ' },
                        {
                            type: 'styled',
                            color: 'red',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: '> 错误：部分扇区已损坏。' }]
                        },
                        { type: 'text', value: '\n> 最新条目：\n“如果你读到这条信息，说明 ' },
                        {
                            type: 'styled',
                            color: '',
                            underline: false,
                            strike: true,
                            children: [{ type: 'text', value: '协议已被打破' }]
                        },
                        { type: 'text', value: '。不要相信外面的声音。只相信磁带。”\n\n日志结束。' }
                    ],
                    options: [
                        { text: '弹出磁带', target: 'eject' },
                        { text: '观察四周', target: 'look_around' }
                    ]
                },
                {
                    id: 'look_around',
                    image: '',
                    content: [
                        { type: 'text', value: '昏暗的琥珀色灯光照亮了控制台。桌面上散落着几张软盘和一个半满的合成咖啡杯。' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n窗外不是星空，而是无尽的 ' },
                        {
                            type: 'styled',
                            color: '#aaa',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: '静态雪花噪点' }]
                        },
                        { type: 'text', value: '。' }
                    ],
                    options: [
                        { text: '检查软盘', target: 'floppy' },
                        { text: '坐回终端前', target: 'start_loop' }
                    ]
                },
                {
                    id: 'floppy',
                    image: '',
                    content: [
                        { type: 'text', value: '你拿起一张标签模糊的软盘。上面手写着：“重启密钥”。\n' },
                        {
                            type: 'styled',
                            color: 'red',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: '警告：这可能会覆盖当前的人格矩阵。' }]
                        },
                        { type: 'pause', ms: 500 }
                    ],
                    options: [
                        { text: '插入软盘 [危险]', target: 'reboot' },
                        { text: '放下软盘', target: 'look_around' }
                    ]
                },
                {
                    id: 'eject',
                    image: '',
                    content: [
                        { type: 'text', value: '咔嚓。' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n磁带仓弹开。这是你唯一的存储介质。\n' },
                        {
                            type: 'styled',
                            color: 'red',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: '系统警告：将在 5 秒后丢失所有记忆。' }]
                        }
                    ],
                    options: [
                        { text: '立即推回磁带', target: 'start' },
                        { text: '接受虚无', target: 'game_over' }
                    ]
                },
                {
                    id: 'start_loop',
                    image: '',
                    content: [
                        { type: 'text', value: '你感觉刚才发生的一切似乎都发生过。' },
                        {
                            type: 'styled',
                            color: '',
                            underline: true,
                            strike: false,
                            children: [{ type: 'text', value: '既视感' }]
                        },
                        { type: 'text', value: ' 充斥着你的逻辑电路。' }
                    ],
                    options: [
                        { text: '重新初始化', target: 'start' }
                    ]
                },
                {
                    id: 'reboot',
                    image: '',
                    content: [
                        { type: 'text', value: '读取中...' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n' },
                        {
                            type: 'styled',
                            color: 'red',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: 'FATAL ERROR.' }]
                        },
                        { type: 'text', value: '\n系统核心转储。' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n\n新的意识正在覆写...' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n\n' },
                        {
                            type: 'styled',
                            color: '#fff',
                            underline: false,
                            strike: false,
                            children: [{ type: 'text', value: '你好，世界。' }]
                        }
                    ],
                    options: [
                        { text: '重新开始', target: 'start' }
                    ]
                },
                {
                    id: 'game_over',
                    image: '',
                    content: [
                        { type: 'text', value: '信号丢失...' },
                        { type: 'pause', ms: 500 },
                        { type: 'text', value: '\n连接断开。\n\n' },
                        {
                            type: 'styled',
                            color: '',
                            underline: false,
                            strike: true,
                            children: [{ type: 'text', value: 'USER DISCONNECTED' }]
                        }
                    ],
                    options: [
                        { text: '重置模拟', target: 'start' }
                    ]
                }
            ]
        };
    </script>
    <script type="module" src="./js/pages/runtime-inline.js"></script>
</body>
</html>
